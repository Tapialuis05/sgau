name: Deploy — Producción

on:
  push:
    branches: [ main ]

jobs:
  deploy-frontend:
    name: Deploy Gateway → Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest
      - name: Deploy a Vercel
        run: |
          cd gateway_service
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-auth-service:
    name: Deploy auth-service → Render
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_AUTH_SERVICE_ID }}/deploys" \
            -d '{}'

  deploy-student-service:
    name: Deploy student_service → Render
