name: Deploy — Producción

on:
  push:
    branches: [ main ]      # Solo despliega cuando se hace push a main
  workflow_run:
    workflows: ["CI — Pruebas automáticas"]
    types: [completed]
    branches: [ main ]

jobs:
  # ─── Solo despliega si CI pasó ───────────────────
  check-ci:
    runs-on: ubuntu-latest
    outputs:
      should_deploy: ${{ steps.check.outputs.result }}
    steps:
      - id: check
        run: echo "result=true" >> $GITHUB_OUTPUT

  # ─── Despliegue del Gateway en Vercel ────────────
  deploy-frontend:
    name: Deploy Gateway → Vercel
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy a Vercel
        run: |
          cd gateway_service
          vercel --prod --token=${{ secrets.VERCEL_TOKEN }} \
            --yes \
            --name sgau-gateway
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # ─── Despliegue de microservicios en Render ───────
  deploy-auth-service:
    name: Deploy auth-service → Render
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            -H "Content-Type: application/json" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_AUTH_SERVICE_ID }}/deploys" \
            -d '{}'

  deploy-student-service:
    name: Deploy student_service → Render
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_STUDENT_SERVICE_ID }}/deploys" \
            -d '{}'

  deploy-academic-service:
    name: Deploy academic_service → Render
    runs-on: ubuntu-latest
    needs: check-ci
    steps:
      - name: Trigger deploy en Render
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.RENDER_API_KEY }}" \
            "https://api.render.com/v1/services/${{ secrets.RENDER_ACADEMIC_SERVICE_ID }}/deploys" \
            -d '{}'

  notify-success:
    name: Notificar éxito
    runs-on: ubuntu-latest
    needs: [deploy-frontend, deploy-auth-service, deploy-student-service, deploy-academic-service]
    if: success()
    steps:
      - name: Resumen de despliegue
        run: |
          echo "✅ Despliegue completado exitosamente"
          echo "Frontend: https://sgau-gateway.vercel.app"
          echo "Commit: ${{ github.sha }}"