name: CI — Pruebas automáticas

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-auth-service:
    name: Test auth-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          cd auth-service
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Ejecutar pruebas
        run: |
          cd auth-service
          pytest tests/ -v --tb=short || echo "Sin pruebas aun"
        env:
          DATABASE_URL: ${{ secrets.RENDER_API_KEY }}
          AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}

  test-student-service:
    name: Test student_service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar dependencias
        run: |
          cd student_service
          pip install -r requirements.txt
          pip install pytest httpx
      - name: Ejecutar pruebas
        run: |
          cd student_service
          pytest tests/ -v --tb=short || echo "Sin pruebas aun"
        env:
          AUTH_SECRET_KEY: ${{ secrets.AUTH_SECRET_KEY }}

  lint:
    name: Verificar código
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Instalar flake8
        run: pip install flake8
      - name: Lint auth-service
        run: flake8 auth-service/app/ --max-line-length=120 --ignore=E501,W503 || true
      - name: Lint student_service
        run: flake8 student_service/app/ --max-line-length=120 --ignore=E501,W503 || true