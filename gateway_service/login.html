<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SGAU — Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    body {
      background: #f0f9ff;
    }

    /* Contenedor principal - dos columnas */
    .main-wrapper {
      display: flex;
      width: 100%;
      height: 100%;
      align-items: center;
      justify-content: center;
    }

    /* Sección de imagen */
    .image-section {
      position: absolute;
      left: 0;
      top: 0;
      width: 55%;
      height: 100%;
      background: linear-gradient(135deg, #1D4ED8 0%, #1E40AF 50%, #3B82F6 100%);
      background-image: url('/static/resorces/images/estudiante.jpg');
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
      box-shadow: inset -100px 0 100px rgba(0, 0, 0, 0.3);
      z-index: 1;
    }

    .image-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, rgba(29, 78, 216, 0.6) 0%, rgba(29, 78, 216, 0.3) 100%);
      z-index: 2;
    }

    /* Login Card */
    .login-container {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 450px;
      padding: 2rem;
      margin-left: 55%;
    }

    .login-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(59, 130, 246, 0.2);
      border-radius: 20px;
      padding: 3rem 2.5rem;
      box-shadow: 0 20px 60px rgba(29, 78, 216, 0.15);
      animation: slideUp 0.5s ease-out;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .login-title {
      font-size: 2.8rem;
      font-weight: 700;
      text-align: left;
      margin-bottom: 0.5rem;
      color: #1D4ED8;
      letter-spacing: -0.5px;
    }

    .card-note {
      color: #64748B;
      font-size: 0.95rem;
      text-align: left;
      margin-bottom: 1.8rem;
      line-height: 1.5;
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 1.2rem;
    }

    .form-group {
      position: relative;
    }

    .password-group .form-input {
      padding-right: 5.2rem;
    }

    .password-toggle {
      position: absolute;
      right: 0.65rem;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid #D1D5DB;
      background: #F3F4F6;
      color: #4B5563;
      border-radius: 8px;
      width: 2.25rem;
      height: 2.05rem;
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .password-toggle:hover {
      background: #E5E7EB;
      border-color: #9CA3AF;
      color: #374151;
    }

    .password-toggle:focus-visible {
      outline: 2px solid #60A5FA;
      outline-offset: 1px;
    }

    .password-toggle svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.9;
      stroke-linecap: round;
      stroke-linejoin: round;
      pointer-events: none;
    }

    .password-toggle .icon-eye-off {
      display: none;
    }

    .password-toggle.is-visible .icon-eye {
      display: none;
    }

    .password-toggle.is-visible .icon-eye-off {
      display: block;
    }

    .form-input {
      width: 100%;
      padding: 0.95rem 1.2rem;
      background: #f8fafc;
      border: 2px solid #E2E8F0;
      border-radius: 12px;
      color: #1F2937;
      font-family: 'DM Sans', sans-serif;
      font-size: 1rem;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input::placeholder {
      color: #94A3B8;
    }

    .form-input:focus {
      background: #ffffff;
      border-color: #3B82F6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }

    .form-options {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .remember-me {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      cursor: pointer;
      color: #475569;
      transition: color 0.3s ease;
    }

    .remember-me:hover {
      color: #1D4ED8;
    }

    .remember-me input[type="checkbox"] {
      width: 18px;
      height: 18px;
      cursor: pointer;
      accent-color: #3B82F6;
    }

    .forgot-password {
      color: #3B82F6;
      text-decoration: none;
      transition: color 0.3s ease;
      font-weight: 500;
    }

    .forgot-password:hover {
      color: #1D4ED8;
      text-decoration: underline;
    }

    .login-button {
      width: 100%;
      padding: 1rem 1.5rem;
      background: linear-gradient(135deg, #1D4ED8 0%, #3B82F6 100%);
      color: #ffffff;
      border: none;
      border-radius: 12px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 8px 20px rgba(29, 78, 216, 0.25);
      margin-top: 0.5rem;
    }

    .login-button:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 30px rgba(29, 78, 216, 0.35);
    }

    .login-button:active {
      transform: translateY(0);
    }

    .login-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .secondary-button {
      display: none;
    }

    .register-panel {
      display: none;
      margin-top: 1.2rem;
      padding-top: 1.2rem;
      border-top: 1px solid #E2E8F0;
    }

    .register-panel.open {
      display: block;
    }

    .login-mode-hidden {
      display: none;
    }

    .register-grid {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .error-msg {
      color: #EF4444;
      font-size: 0.85rem;
      text-align: center;
      margin-top: 1rem;
      min-height: 20px;
      animation: shake 0.3s ease-in-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .loading {
      display: none;
      text-align: center;
      color: #1D4ED8;
      margin-top: 1rem;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(29, 78, 216, 0.2);
      border-radius: 50%;
      border-top-color: #3B82F6;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 1024px) {
      .image-section {
        width: 45%;
      }

      .login-container {
        margin-left: 45%;
      }
    }

    @media (max-width: 768px) {
      .image-section {
        position: relative;
        width: 100%;
        height: 40%;
        box-shadow: inset 0 -100px 100px rgba(0, 0, 0, 0.3);
      }

      .image-section::before {
        background: linear-gradient(180deg, rgba(29, 78, 216, 0.6) 0%, rgba(29, 78, 216, 0.3) 100%);
      }

      .main-wrapper {
        flex-direction: column;
      }

      .login-container {
        margin-left: 0;
        width: 100%;
        height: 60%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .login-card {
        margin: 1rem;
        padding: 2rem 1.5rem;
      }

      .login-title {
        font-size: 2rem;
      }

      .form-input {
        font-size: 16px;
      }
    }

    @media (max-width: 576px) {
      .login-card {
        margin: 1rem;
        padding: 1.5rem 1rem;
      }

      .login-title {
        font-size: 1.8rem;
      }

      .login-form {
        gap: 1rem;
      }
    }
  </style>

</head>
<body>
  <!-- Sección de imagen (fondo) -->
  <div class="image-section"></div>

  <!-- Contenedor principal -->
  <div class="main-wrapper">
    <!-- Login Card -->
    <div class="login-container">
      <div class="login-card">
        <h1 class="login-title">Ingresa</h1>
        <p class="card-note">Accede a tu cuenta de estudiante para continuar</p>

        <form class="login-form" id="loginForm" autocomplete="on">
          <!-- Email -->
          <div class="form-group">
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="username"
              placeholder="Correo electrónico"
              class="form-input"
              required
            />
          </div>

          <!-- Password -->
          <div class="form-group password-group">
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Contraseña"
              class="form-input"
              required
            />
            <button type="button" class="password-toggle" data-toggle-password="password" aria-label="Mostrar contraseña" title="Mostrar contraseña">
              <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
              <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M3 3l18 18"></path>
                <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-4.4"></path>
                <path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a16.2 16.2 0 0 1-3.2 4.2"></path>
                <path d="M6.2 6.2A16.9 16.9 0 0 0 2 12s3.5 7 10 7a10.6 10.6 0 0 0 6-1.8"></path>
              </svg>
            </button>
          </div>

          <!-- Options -->
          <div class="form-options">
            <label class="remember-me">
              <input type="checkbox" name="remember" />
              <span>Recuérdame</span>
            </label>
          </div>

          <!-- Login Button -->
          <button type="submit" class="login-button">Ingresar</button>
        </form>

        <div class="register-panel" id="registerPanel">
          <form class="register-grid" id="registerForm">
            <div class="form-group">
              <input
                type="text"
                id="register-first-name"
                name="first_name"
                placeholder="Nombres"
                class="form-input"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="text"
                id="register-last-name"
                name="last_name"
                placeholder="Apellidos"
                class="form-input"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="text"
                id="register-document-id"
                name="document_id"
                placeholder="Número de identidad"
                class="form-input"
                required
              />
            </div>

            <div class="form-group">
              <input
                type="email"
                id="register-email"
                name="email"
                placeholder="Correo institucional @ucc.edu.co"
                class="form-input"
                required
              />
            </div>

            <div class="form-group password-group">
              <input
                type="password"
                id="register-password"
                name="password"
                placeholder="Contraseña"
                class="form-input"
                required
              />
              <button type="button" class="password-toggle" data-toggle-password="register-password" aria-label="Mostrar contraseña" title="Mostrar contraseña">
                <svg class="icon-eye" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M2 12s3.5-6 10-6 10 6 10 6-3.5 6-10 6-10-6-10-6z"></path>
                  <circle cx="12" cy="12" r="3"></circle>
                </svg>
                <svg class="icon-eye-off" viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M3 3l18 18"></path>
                  <path d="M10.6 10.6A3 3 0 0 0 12 15a3 3 0 0 0 2.4-4.4"></path>
                  <path d="M9.9 5.2A10.6 10.6 0 0 1 12 5c6.5 0 10 7 10 7a16.2 16.2 0 0 1-3.2 4.2"></path>
                  <path d="M6.2 6.2A16.9 16.9 0 0 0 2 12s3.5 7 10 7a10.6 10.6 0 0 0 6-1.8"></path>
                </svg>
              </button>
            </div>

            <button type="submit" class="login-button" id="registerSubmitBtn">Crear cuenta de estudiante</button>
          </form>
        </div>

        <!-- Error Message -->
        <div class="error-msg" id="errorMsg"></div>

        <!-- Loading Spinner -->
        <div class="loading" id="loading">
          <div class="spinner"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const API_BASE = "https://sgau-auth-service.onrender.com";
    const loginForm = document.getElementById('loginForm');
    const registerForm = document.getElementById('registerForm');
    const errorMsg = document.getElementById('errorMsg');
    const loading = document.getElementById('loading');

    function setLoadingState(isLoading) {
      loading.style.display = isLoading ? 'block' : 'none';
      document.querySelector('.login-button').disabled = isLoading;
      const registerSubmitBtn = document.getElementById('registerSubmitBtn');
      if (registerSubmitBtn) registerSubmitBtn.disabled = isLoading;
    }

    function initPasswordToggles() {
      document.querySelectorAll('[data-toggle-password]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const targetId = btn.getAttribute('data-toggle-password');
          const input = document.getElementById(targetId);
          if (!input) return;
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.classList.toggle('is-visible', show);
          btn.setAttribute('aria-label', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
          btn.setAttribute('title', show ? 'Ocultar contraseña' : 'Mostrar contraseña');
        });
      });
    }

    initPasswordToggles();

    loginForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const remember = document.querySelector('input[name="remember"]').checked;

      errorMsg.textContent = '';
      setLoadingState(false);

      if (!email || !password) {
        errorMsg.textContent = 'Por favor completa todos los campos';
        return;
      }

      setLoadingState(true);

      try {
        const response = await fetch(`${API_BASE}/auth/login`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({
            email,
            password,
          }),
        });

        const data = await response.json();

        if (response.ok && data.access_token) {
          // Guardar token y datos de usuario
          localStorage.setItem('token', data.access_token);
          localStorage.setItem('user_role', data.role || 'usuario');
          localStorage.setItem('user_email', email);
          
          if (remember) {
            localStorage.setItem('rememberMe', 'true');
            localStorage.setItem('savedEmail', email);
          }

          // Redirigir por rol
          if ((data.role || '').toLowerCase() === 'admin') {
            window.location.href = '/admin';
          } else {
            window.location.href = '/index.html';
          }
        } else {
          errorMsg.textContent = data.detail || 'Email o contraseña inválidos';
          setLoadingState(false);
        }
      } catch (error) {
        console.error('Error:', error);
        errorMsg.textContent = 'Error de conexión. Intenta nuevamente.';
        setLoadingState(false);
      }
    });

    // Cargar email si está guardado
    window.addEventListener('load', () => {
      const savedEmail = localStorage.getItem('savedEmail');
      if (savedEmail) {
        document.getElementById('email').value = savedEmail;
        document.querySelector('input[name="remember"]').checked = true;
      }

      // Si ya está logueado, redirigir al dashboard
      const token = localStorage.getItem('token');
      if (token) {
        window.location.href = '/index.html';
      }
    });
  </script>
</body>
</html>
